name: Studio Deploy

permissions:
  contents: write
  actions: write
  issues: write

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  cancel-previous-runs:
    uses: 922-Studio/workflows/.github/workflows/cancel-previous-runs.yml@main

  version:
    name: Create new version
    needs: cancel-previous-runs
    uses: 922-Studio/workflows/.github/workflows/versioning.yml@main
    secrets:
      PAT_GITHUB: ${{ secrets.PAT_GITHUB }}

  tests:
    name: Run unit tests (Vitest + Allure)
    needs: version
    uses: 922-Studio/workflows/.github/workflows/frontend-tests.yml@main
    with:
      node_version: '22'
      install_command: 'npm ci'
      test_command: 'npm run test:coverage'
      build_command: 'npm run build'
      run_build: true
      allure_results_dir: 'reports/allure'
      allure_server_url: 'http://home-lab:5050'
      allure_project_id: 'studio-unit'
      allure_launch_name: 'Studio Unit Tests'
    secrets:
      DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
      PAT_GITHUB: ${{ secrets.PAT_GITHUB }}

  kick-off-e2e:
    name: Kick off E2E tests
    needs: tests
    runs-on: self-hosted
    steps:
      - name: Trigger E2E workflow
        run: |
          gh workflow run e2e.yml \
            --repo ${{ github.repository }} \
            --ref ${{ github.ref_name }}
        env:
          GH_TOKEN: ${{ secrets.PAT_GITHUB }}

  deploy:
    name: Deploy to server
    needs: tests
    uses: 922-Studio/workflows/.github/workflows/deploy-docker.yml@main
    with:
      repository_path: '/home/lab/studio'
      boot_script: 'deploy.sh'
      service_name: 'studio'
    secrets:
      PAT_GITHUB: ${{ secrets.PAT_GITHUB }}

  create-issue:
    needs: [tests, deploy]
    if: failure()
    uses: 922-Studio/workflows/.github/workflows/create-issue.yml@main
    with:
      job_name: 'tests / deploy'
      workflow_status: 'failure'
      repository_name: '${{ github.repository }}'
      branch_name: '${{ github.ref_name }}'
      run_number: '${{ github.run_number }}'
      run_url: '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'
      run_id: '${{ github.run_id }}'
      triggering_actor: '${{ github.actor }}'
    secrets:
      PAT_GITHUB: ${{ secrets.PAT_GITHUB }}

  notify-success:
    name: Discord notification (success)
    needs: [version, deploy]
    if: success()
    uses: 922-Studio/workflows/.github/workflows/send-notification.yml@main
    with:
      enable_email: false
      enable_discord: true
      discord_channel_id: '1465354445113000032'
      workflow_status: 'success'
      workflow_name: ${{ github.workflow }}
      repository_name: ${{ github.repository }}
      run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      latest_version: ${{ needs.version.outputs.new_version }}
    secrets:
      DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}

  notify-failure:
    name: Discord notification (failure)
    needs: [tests, deploy, create-issue]
    if: failure()
    uses: 922-Studio/workflows/.github/workflows/send-notification.yml@main
    with:
      enable_email: false
      enable_discord: true
      discord_channel_id: '1465354445113000032'
      workflow_status: 'failure'
      workflow_name: ${{ github.workflow }}
      repository_name: ${{ github.repository }}
      run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      issue_url: '${{ needs.create-issue.outputs.issue_url }}'
    secrets:
      DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
      PAT_GITHUB: ${{ secrets.PAT_GITHUB }}
