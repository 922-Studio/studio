name: Studio Deploy

permissions:
  contents: write
  actions: write
  issues: write

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  cancel-previous-runs:
    uses: 922-Studio/workflows/.github/workflows/cancel-previous-runs.yml@main

  version:
    name: Create new version
    needs: cancel-previous-runs
    uses: 922-Studio/workflows/.github/workflows/versioning.yml@main
    secrets:
      PAT_GITHUB: ${{ secrets.PAT_GITHUB }}

  build:
    name: Build Docker image
    needs: version
    uses: 922-Studio/workflows/.github/workflows/docker-build.yml@main
    with:
      registry_url: registry.922-studio.com
      image_name: studio
      tag: prod-v${{ needs.version.outputs.new_version }}
      build_args: |
        NEXT_PUBLIC_GA_MEASUREMENT_ID=G-1GSBD62ZVM
      push: false
      repository_path: '/home/lab/studio'
      pull_code: true
    secrets:
      REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
      REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
      PAT_GITHUB: ${{ secrets.PAT_GITHUB }}

  tests:
    name: Run unit tests (Vitest + Allure)
    needs: version
    uses: 922-Studio/workflows/.github/workflows/frontend-tests.yml@main
    with:
      node_version: '22'
      install_command: 'npm ci'
      test_command: 'npm run test:coverage'
      build_command: 'npm run build'
      run_build: true
      allure_results_dir: 'reports/allure'
      allure_server_url: 'http://home-lab:5050'
      allure_project_id: 'studio-unit'
      allure_launch_name: 'Studio Unit Tests'
    secrets:
      DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
      PAT_GITHUB: ${{ secrets.PAT_GITHUB }}

  push-prod:
    name: Push prod image to registry
    needs: [version, build, tests]
    environment:
      name: production
      url: https://studio.922-studio.com
    uses: 922-Studio/workflows/.github/workflows/docker-build.yml@main
    with:
      registry_url: registry.922-studio.com
      image_name: studio
      tag: prod-v${{ needs.version.outputs.new_version }}
      mutable_tag: prod
      build_args: |
        NEXT_PUBLIC_GA_MEASUREMENT_ID=G-1GSBD62ZVM
      push: true
      repository_path: '/home/lab/studio'
      pull_code: false
    secrets:
      REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
      REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
      PAT_GITHUB: ${{ secrets.PAT_GITHUB }}

  kick-off-e2e:
    name: Kick off E2E tests
    needs: tests
    runs-on: self-hosted
    steps:
      - name: Trigger E2E workflow
        run: |
          gh workflow run e2e.yml \
            --repo ${{ github.repository }} \
            --ref ${{ github.ref_name }}
        env:
          GH_TOKEN: ${{ secrets.PAT_GITHUB }}

  create-issue:
    needs: [tests, push-prod]
    if: ${{ !cancelled() && (needs.tests.result == 'failure' || needs.push-prod.result == 'failure') }}
    uses: 922-Studio/workflows/.github/workflows/create-issue.yml@main
    with:
      job_name: 'build / tests / push'
      workflow_status: 'failure'
      repository_name: '${{ github.repository }}'
      branch_name: '${{ github.ref_name }}'
      run_number: '${{ github.run_number }}'
      run_url: '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'
      run_id: '${{ github.run_id }}'
      triggering_actor: '${{ github.actor }}'
    secrets:
      PAT_GITHUB: ${{ secrets.PAT_GITHUB }}

  notify-success:
    name: Discord notification (success)
    needs: [version, push-prod]
    if: ${{ !cancelled() && needs.push-prod.result == 'success' }}
    uses: 922-Studio/workflows/.github/workflows/send-notification.yml@main
    with:
      enable_email: false
      enable_discord: true
      discord_channel_id: '1465354445113000032'
      workflow_status: 'success'
      workflow_name: ${{ github.workflow }}
      repository_name: ${{ github.repository }}
      run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      latest_version: ${{ needs.version.outputs.new_version }}
    secrets:
      DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}

  notify-failure:
    name: Discord notification (failure)
    needs: [tests, push-prod, create-issue]
    if: ${{ !cancelled() && (needs.tests.result == 'failure' || needs.push-prod.result == 'failure') }}
    uses: 922-Studio/workflows/.github/workflows/send-notification.yml@main
    with:
      enable_email: false
      enable_discord: true
      discord_channel_id: '1465354445113000032'
      workflow_status: 'failure'
      workflow_name: ${{ github.workflow }}
      repository_name: ${{ github.repository }}
      run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      issue_url: '${{ needs.create-issue.outputs.issue_url }}'
    secrets:
      DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
      PAT_GITHUB: ${{ secrets.PAT_GITHUB }}
